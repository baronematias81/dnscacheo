version: '3.8'

services:
  dnscacheo:
    build: .
    container_name: dnscacheo
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "853:853/tcp"   # DoT
      - "443:443/tcp"   # DoH
      - "8080:8080/tcp" # API admin
    depends_on:
      - redis
      - postgres
    volumes:
      - ./config:/app/config
      - ./logs:/var/log/dnscacheo
    environment:
      - ENV=production

  redis:
    image: redis:7-alpine
    container_name: dnscacheo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

  postgres:
    image: postgres:16-alpine
    container_name: dnscacheo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dnscacheo
      POSTGRES_USER: dnscacheo
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: dnscacheo-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: dnscacheo-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=changeme
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/dnscacheo.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

volumes:
  redis_data:
  postgres_data:
  grafana_data:
