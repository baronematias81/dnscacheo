server:
  # ── IPv4 ─────────────────────────────────────────────────
  listen_udp4: "0.0.0.0:53"
  listen_tcp4: "0.0.0.0:53"

  # ── IPv6 ─────────────────────────────────────────────────
  ipv6_enabled: true
  listen_udp6: "[::]:53"
  listen_tcp6: "[::]:53"

  timeout: "2s"

  # Upstreams IPv4
  upstreams4:
    - "1.1.1.1:53"       # Cloudflare
    - "8.8.8.8:53"       # Google
    - "9.9.9.9:53"       # Quad9

  # Upstreams IPv6 (se usan cuando el cliente conecta por IPv6)
  upstreams6:
    - "[2606:4700:4700::1111]:53"   # Cloudflare IPv6
    - "[2606:4700:4700::1001]:53"   # Cloudflare IPv6 secundario
    - "[2001:4860:4860::8888]:53"   # Google IPv6
    - "[2001:4860:4860::8844]:53"   # Google IPv6 secundario
    - "[2620:fe::fe]:53"            # Quad9 IPv6

cache:
  redis_url: "redis://localhost:6379"
  default_ttl: 300
  max_ttl: 86400
  prefetch_threshold: 10

database:
  host: "localhost"
  port: 5432
  name: "dnscacheo"
  user: "dnscacheo"
  password: ""

# ── TLS (compartido por DoT y DoH) ────────────────────────
tls:
  enabled: false
  cert_file: "certs/server.crt"
  key_file:  "certs/server.key"
  auto_generate: true
  min_version: "1.2"
  sans:
    - "localhost"
    - "127.0.0.1"
    - "::1"                         # loopback IPv6
    # - "dns.grupobaron.com.ar"
    # - "2001:db8::1"               # IP pública IPv6

# ── DNS over TLS (DoT) — RFC 7858 ─────────────────────────
dot:
  enabled: false
  listen: "0.0.0.0:853"
  listen_ipv6: "[::]:853"           # DoT también en IPv6
  ipv6_enabled: true
  timeout: "10s"

# ── DNS over HTTPS (DoH) — RFC 8484 ───────────────────────
doh:
  enabled: false
  listen: "0.0.0.0:443"
  listen_ipv6: "[::]:443"           # DoH también en IPv6
  ipv6_enabled: true
  path: "/dns-query"
  listen_plain: ""                  # HTTP plano para proxy TLS externo

# ── Rate Limiting (token bucket por cliente) ──────────────
rate_limit:
  enabled: true
  global_rate: 100          # consultas/segundo por cliente (defecto)
  global_burst: 200         # ráfaga máxima permitida
  cleanup_interval: 60      # segundos entre cleanup de buckets inactivos
  idle_timeout: 300         # segundos sin actividad para liberar bucket
  per_client_rates:
    # Ejemplos de reglas por subred:
    # - cidr: "192.168.1.0/24"
    #   rate: 500             # subred interna con límite mayor
    #   burst: 1000
    # - cidr: "10.0.0.0/8"
    #   rate: 200
    #   burst: 400
    # - cidr: "2001:db8::/32" # subred IPv6
    #   rate: 300
    #   burst: 600

filter:
  enabled: true
  categories:
    malware: true
    ads: true
    adult: false
    gambling: false
  blocklist_update_interval: 24h

zero_trust:
  enabled: true
  require_encrypted: false
  default_policy: "allow"
  anomaly_detection: true

tunnel_detection:
  enabled: true
  entropy_min: 3.8
  label_len_min: 45
  unique_subs_window: 60
  unique_subs_min: 40
  query_rate_window: 60
  query_rate_min: 150

logging:
  level: "info"
  query_log: true
  log_file: "/var/log/dnscacheo/queries.log"

# ── Métricas Prometheus ────────────────────────────���───────
metrics:
  enabled: true
  listen: "0.0.0.0:9090"   # GET /metrics para Prometheus scrape
